<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Leave Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f7;
    --surface: #ffffff;
    --surface2: #f7f8fc;
    --border: #e4e7ef;
    --text: #1a1d2e;
    --text2: #6b7280;
    --accent: #3d5afe;
    --accent-light: #eef0ff;
    --danger: #ef4444;
    --danger-light: #fff0f0;
    --success: #10b981;
    --warn: #f59e0b;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--text);
    color: white;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 { font-size: 15px; font-weight: 700; letter-spacing: 0.3px; }
  #syncStatus { font-size: 11px; font-family: 'DM Mono', monospace; opacity: 0.6; }
  #syncStatus.syncing { color: #fbbf24; opacity: 1; }
  #syncStatus.ok { color: #34d399; opacity: 1; }
  #syncStatus.err { color: #f87171; opacity: 1; }

  /* ── TABS ── */
  .tab-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-shrink: 0;
  }
  .tab-btn {
    flex: 1;
    padding: 12px 4px;
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

  /* ── PAGES ── */
  .pages-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .pages {
    display: flex;
    width: 400%;
    height: 100%;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .page {
    width: 25%;
    height: 100%;
    overflow-y: auto;
    padding: 12px;
    -webkit-overflow-scrolling: touch;
  }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text2);
    margin-bottom: 12px;
  }

  /* ── PERSON ROW ── */
  .person-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
  }
  .avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .person-info { flex: 1; }
  .person-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }

  /* ── PILLS ── */
  .pills { display: flex; flex-wrap: wrap; gap: 4px; }
  .pill {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 7px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .pill-del {
    background: none; border: none; cursor: pointer;
    color: var(--text2); font-size: 13px; line-height: 1;
    padding: 0; margin-left: 2px;
    transition: color 0.15s;
  }
  .pill-del:hover { color: var(--danger); }

  /* ── NO-LEAVE ── */
  .empty { color: var(--text2); font-size: 12px; font-style: italic; padding: 4px 0; }

  /* ── ADD FORM ── */
  .add-form {
    background: var(--accent-light);
    border: 1.5px solid var(--accent);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
  }
  .add-form .form-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }
  .form-row { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .form-row select, .form-row input {
    flex: 1;
    min-width: 80px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-row select:focus, .form-row input:focus { border-color: var(--accent); }
  .form-row input { font-family: 'DM Mono', monospace; }
  .btn-add {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 9px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-add:hover { opacity: 0.9; }
  .btn-add:active { transform: scale(0.98); }
  .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── CALENDAR ── */
  .month-block { margin-bottom: 20px; }
  .month-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
    padding: 0 2px;
  }
  .day-headers {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 3px;
  }
  .day-hdr {
    text-align: center;
    font-size: 9px;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .cal-day {
    background: var(--surface);
    border-radius: 6px;
    padding: 4px 3px;
    min-height: 36px;
    cursor: pointer;
    transition: box-shadow 0.15s;
    border: 1px solid transparent;
  }
  .cal-day:hover { box-shadow: 0 0 0 1.5px var(--accent); }
  .cal-day.has-leave { border-color: var(--border); }
  .cal-day.today { border-color: var(--accent); background: var(--accent-light); }
  .cal-day-num {
    font-size: 9px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 3px;
  }
  .cal-dots {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
  }
  .cal-dot {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    border-radius: 999px;
    padding: 1px 5px 1px 3px;
    font-size: 8px;
    font-weight: 700;
    color: white;
    white-space: nowrap;
    line-height: 1.4;
  }
  .cal-dot-circle {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    flex-shrink: 0;
  }
  .cal-day.empty-day { background: transparent; border: none; cursor: default; }
  .cal-day.empty-day:hover { box-shadow: none; }
  .cal-day.is-ph { background: #fff8e1; border-color: #f59e0b !important; }
  .cal-day.is-lieu { background: #fff3e0; border-color: #fb923c !important; }
  .cal-ph-label {
    font-size: 7px;
    font-weight: 700;
    color: #b45309;
    line-height: 1.2;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cal-lieu-label {
    font-size: 7px;
    font-weight: 700;
    color: #c2410c;
    line-height: 1.2;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cal-day-num.ph-num { color: #b45309; font-weight: 800; }
  .cal-day-num.lieu-num { color: #c2410c; font-weight: 800; }

  /* ── SUMMARY ── */
  .sum-month-card {
    background: var(--surface);
    border-radius: var(--radius);
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .sum-month-hdr {
    background: var(--text);
    color: white;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 12px;
  }
  .sum-list { padding: 4px 0; }
  .sum-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-bottom: 1px solid var(--border);
  }
  .sum-row:last-child { border-bottom: none; }
  .sum-avatar {
    width: 22px; height: 22px;
    border-radius: 50%;
    font-size: 8px;
    font-weight: 700;
    color: white;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .sum-name {
    font-size: 12px;
    font-weight: 600;
    width: 58px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sum-segs {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    flex: 1;
  }
  .sum-pill {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 5px;
  }

  /* ── MANAGE PAGE ── */
  .mgmt-box {
    background: var(--surface);
    border-radius: var(--radius);
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .mgmt-box-hdr {
    background: var(--text);
    color: white;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 9px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mgmt-count {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 1px 8px;
    font-size: 11px;
    font-weight: 600;
  }
  .mgmt-box-body { padding: 12px; }
  .mgmt-form-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .mgmt-select, .mgmt-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 10px;
    font-family: inherit;
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .mgmt-select:focus, .mgmt-input:focus { border-color: var(--accent); }
  .mgmt-input { font-family: 'DM Mono', monospace; }
  .mgmt-btn-add {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .mgmt-btn-add:hover { opacity: 0.88; }
  .mgmt-btn-add:active { transform: scale(0.98); }
  .mgmt-btn-add:disabled { opacity: 0.45; cursor: not-allowed; }
  .mgmt-search {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .mgmt-search:focus { border-color: var(--accent); }
  .mgmt-list { }
  .mgmt-entry {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    transition: background 0.15s;
  }
  .mgmt-entry:hover { background: var(--surface2); }
  .mgmt-entry-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-width: 0;
  }
  .mgmt-entry-name { font-size: 12px; font-weight: 700; }
  .mgmt-entry-meta {
    font-size: 11px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mgmt-entry-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .mgmt-error {
    background: #fff0f0;
    border: 1px solid #fca5a5;
    border-radius: 7px;
    color: #dc2626;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 10px;
    margin-bottom: 8px;
  }
  .btn-icon {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.15s;
  }
  .btn-icon:hover { background: var(--border); }
  .btn-icon.del:hover { background: var(--danger-light); border-color: var(--danger); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
    animation: fadein 0.2s;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 480px;
    padding: 20px;
    animation: slideup 0.25s cubic-bezier(0.4,0,0.2,1);
  }
  .modal-title { font-weight: 700; font-size: 15px; margin-bottom: 14px; }
  .modal-body { font-size: 13px; line-height: 1.7; color: var(--text2); margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; }
  .btn-modal {
    flex: 1; padding: 10px; border-radius: 9px; font-family: inherit;
    font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
  .btn-confirm-del { background: var(--danger); color: white; }
  .btn-confirm-save { background: var(--accent); color: white; }
  .btn-modal:hover { opacity: 0.85; }

  .edit-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    margin-bottom: 14px;
  }

  @keyframes fadein { from { opacity:0 } to { opacity:1 } }
  @keyframes slideup { from { transform: translateY(30px) } to { transform: translateY(0) } }

  /* ── LOADING ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    gap: 10px;
    color: var(--text2);
    font-size: 13px;
  }
  .spinner {
    width: 24px; height: 24px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg) } }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--text);
    color: white;
    border-radius: 20px;
    padding: 9px 18px;
    font-size: 12px;
    font-weight: 500;
    z-index: 200;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    white-space: nowrap;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .week-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text2);
    margin-bottom: 6px;
    padding: 0 2px;
  }

  /* ── AUDIT LOG ── */
  .audit-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
  }
  .audit-row:last-child { border-bottom: none; }
  .audit-info { flex: 1; min-width: 0; }
  .audit-top {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 2px;
  }
  .audit-name { font-size: 12px; font-weight: 700; }
  .audit-badge {
    font-size: 10px;
    font-weight: 700;
    border-radius: 20px;
    padding: 1px 7px;
    color: white;
  }
  .audit-add    { background: var(--success); }
  .audit-edit   { background: var(--accent); }
  .audit-delete { background: var(--danger); }
  .audit-dates {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text2);
  }
  .audit-time {
    font-size: 10px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
  }

  /* ── MANAGE DATE INPUTS ── */
  .mgmt-date-group { display: flex; flex-direction: column; flex: 1; gap: 3px; }
  .mgmt-date-label { font-size: 11px; color: var(--text2); font-weight: 500; }
</style>
</head>
<body>

<header>
  <h1>📅 Leave Tracker</h1>
  <span id="syncStatus">—</span>
</header>

<div class="tab-bar">
  <div class="tab-btn active" onclick="goTab(0)">Home</div>
  <div class="tab-btn" onclick="goTab(1)">Calendar</div>
  <div class="tab-btn" onclick="goTab(2)">Summary</div>
  <div class="tab-btn" onclick="goTab(3)">Manage</div>
</div>

<div class="pages-wrap">
  <div class="pages" id="pages">
    <div class="page" id="pg-home"></div>
    <div class="page" id="pg-calendar"></div>
    <div class="page" id="pg-summary"></div>
    <div class="page" id="pg-manage"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="handleModalOverlay(event)">
  <div class="modal-box" id="modalBox"></div>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   SUPABASE SETUP
═══════════════════════════════════════════ */
const SUPABASE_URL = 'https://arrhcpymwoqspnflquuk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFycmhjcHltd29xc3BuZmxxdXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDUwNTAsImV4cCI6MjA5MjE4MTA1MH0.JppV_Rqibi6Eb6dsc6pda0CXS5Fk4ZxgH47RQVtv3GE';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

/* ═══════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════ */
const MONTHS  = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const PALETTE = ["#ef4444","#3b82f6","#10b981","#a855f7","#f59e0b","#ec4899","#14b8a6","#f97316","#8b5cf6","#06b6d4","#84cc16","#e11d48"];
const CAL_YEARS = [2026];

const LEAVE_TYPES = [
  { value:'annual',   label:'Annual' },
  { value:'medical',  label:'Medical' },
  { value:'half_am',  label:'Half Day (AM)' },
  { value:'half_pm',  label:'Half Day (PM)' },
  { value:'hl',       label:'HL' },
  { value:'other',    label:'Other' },
];

const PUBLIC_HOLIDAYS = {
  "Jan-1":"New Year's Day","Feb-17":"CNY","Feb-18":"CNY",
  "Mar-21":"Hari Raya Puasa","Apr-3":"Good Friday",
  "May-1":"Labour Day","May-27":"Hari Raya Haji",
  "Jun-1":"Vesak (in lieu)","Aug-10":"National Day (in lieu)",
  "Nov-9":"Deepavali (in lieu)","Dec-25":"Christmas Day",
};

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let employees  = [];  // [{id, name}]
let allEntries = [];  // raw rows from leave_entries joined with employee name
let leaveData  = {};  // { "Apr": [ {name, blocks:[{id,start,end,type,note}]} ] }
let colorMap   = {};
let auditLog   = [];  // last 20 audit entries

function getColor(name){ return colorMap[name] || "#6b7280"; }
function phKey(m,d){ return m+"-"+d; }
function leaveTypeLabel(t){ return (LEAVE_TYPES.find(x=>x.value===t)||{label:t}).label; }

/* ═══════════════════════════════════════════
   DATA LAYER
═══════════════════════════════════════════ */
async function loadData(){
  setSync("syncing","syncing…");

  // Fetch employees
  const { data: empData, error: empErr } = await db
    .from('employees').select('*').order('name');
  if(empErr){ setSync("err","error"); showToast("Failed to load employees: "+empErr.message); return; }
  employees = empData || [];

  // Build colorMap from employee list
  colorMap = {};
  employees.forEach((e,i) => colorMap[e.name] = PALETTE[i % PALETTE.length]);

  // Fetch leave entries joined to employee name
  const { data: leaveRaw, error: leaveErr } = await db
    .from('leave_entries')
    .select('id, employee_id, start_date, end_date, leave_type, note, employees(name)')
    .order('start_date');
  if(leaveErr){ setSync("err","error"); showToast("Failed to load leave: "+leaveErr.message); return; }

  // Flatten: attach employee name directly
  allEntries = (leaveRaw || []).map(r => ({
    id:         r.id,
    employee_id:r.employee_id,
    name:       r.employees?.name || '?',
    start_date: r.start_date,
    end_date:   r.end_date,
    leave_type: r.leave_type || 'annual',
    note:       r.note || '',
  }));

  // Build leaveData: group by month, then by person
  // Only include CAL_YEARS entries
  leaveData = {};
  allEntries.forEach(row => {
    const yr = Number(row.start_date.slice(0,4));
    if(!CAL_YEARS.includes(yr)) return;

    const monthIdx = Number(row.start_date.slice(5,7)) - 1;
    const m = MONTHS[monthIdx];

    if(!leaveData[m]) leaveData[m] = {};
    if(!leaveData[m][row.name])
      leaveData[m][row.name] = { name: row.name, blocks: [] };
    leaveData[m][row.name].blocks.push(row);
  });
  Object.keys(leaveData).forEach(m => {
    leaveData[m] = Object.values(leaveData[m]);
  });

  // Fetch last 20 audit log entries
  const { data: auditRaw } = await db
    .from('audit_log')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(20);
  auditLog = auditRaw || [];

  setSync("ok","synced ("+allEntries.length+")");
  console.log("Loaded", allEntries.length, "entries");
}

/* Format a leave block as a readable date string: "3–12", "7 (AM)", "15–24 HL" */
function fmtBlock(block){
  const s = Number(block.start_date.slice(8));
  const e = Number(block.end_date.slice(8));
  let str = s === e ? String(s) : s+"–"+e;
  if(block.leave_type === 'half_am') str += ' (AM)';
  else if(block.leave_type === 'half_pm') str += ' (PM)';
  else if(block.leave_type === 'medical') str += ' (med)';
  else if(block.leave_type === 'hl') str += ' (HL)';
  if(block.note) str += ' *';
  return str;
}

/* Returns true if date d (1-31) in month m falls within block's range */
function blockCoversDay(block, m, d){
  const year = Number(block.start_date.slice(0,4));
  const blockMonth = MONTHS[Number(block.start_date.slice(5,7))-1];
  if(blockMonth !== m) return false;
  const s = Number(block.start_date.slice(8));
  const e = Number(block.end_date.slice(8));
  return d >= s && d <= e;
}

async function addEntry(employeeId, startDate, endDate, leaveType, note){
  setSync("syncing","saving…");
  const { error } = await db.from('leave_entries').insert({
    employee_id: Number(employeeId),
    start_date:  startDate,
    end_date:    endDate,
    leave_type:  leaveType,
    note:        note || null,
  });
  if(error){ setSync("err","error"); showToast("Save failed: "+error.message); return; }
  showToast("Leave added");
  await refresh();
}

async function deleteEntry(id){
  setSync("syncing","deleting…");
  const { error } = await db.from('leave_entries').delete().eq('id',id);
  if(error){ setSync("err","error"); showToast("Delete failed"); return; }
  showToast("Entry deleted");
  await refresh();
}

async function editEntry(id, startDate, endDate, leaveType, note){
  setSync("syncing","saving…");
  const { error } = await db.from('leave_entries').update({
    start_date: startDate, end_date: endDate,
    leave_type: leaveType, note: note || null,
  }).eq('id',id);
  if(error){ setSync("err","error"); showToast("Update failed"); return; }
  showToast("Entry updated");
  await refresh();
}

  buildHome(); buildCalendar(); buildSummary(); buildManage();
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function getWeek(offset=0){
  const now = new Date();
  const day = now.getDay();
  const diff = (day===0?-6:1-day)+(offset*7);
  const week = [];
  for(let i=0;i<5;i++){
    let d = new Date(now);
    d.setDate(now.getDate()+diff+i);
    week.push({ month:MONTHS[d.getMonth()], day:d.getDate(), date:d,
                iso: d.toISOString().slice(0,10) });
  }
  return week;
}

function fmtWeek(week){
  const a=week[0].date, b=week[4].date;
  const mo=d=>d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  return mo(a)+' – '+mo(b);
}

function setSync(cls,msg){
  const el=document.getElementById('syncStatus');
  el.className=cls; el.textContent=msg;
}

/* ═══════════════════════════════════════════
   BUILD HOME
═══════════════════════════════════════════ */
function buildHome(){
  const el = document.getElementById('pg-home');
  const thisWeek = getWeek(0);
  const nextWeek = getWeek(1);

  function getPeopleOnLeave(week){
    const map = {};
    allEntries.forEach(row => {
      week.forEach(w => {
        if(row.start_date <= w.iso && w.iso <= row.end_date){
          if(!map[row.name]) map[row.name] = [];
          // avoid duplicate blocks for multi-day entries spanning several days
          if(!map[row.name].find(b=>b.id===row.id))
            map[row.name].push(row);
        }
      });
    });
    return map;
  }

  const thisMap = getPeopleOnLeave(thisWeek);
  const nextMap = getPeopleOnLeave(nextWeek);

  function renderWeekCard(title, label, map){
    const keys = Object.keys(map);
    const body = keys.length === 0
      ? '<div class="empty">No leave this week 🎉</div>'
      : keys.map(name =>
          '<div class="person-row">' +
            '<div class="avatar" style="background:'+getColor(name)+'">'+name.slice(0,2)+'</div>' +
            '<div class="person-info">' +
              '<div class="person-name">'+name+'</div>' +
              '<div class="pills">' +
                map[name].map(b=>'<div class="pill">'+fmtBlock(b)+(b.note?' <span title="'+b.note+'">📝</span>':'')+'</div>').join('') +
              '</div>' +
            '</div>' +
          '</div>'
        ).join('');
    return '<div class="card"><div class="card-title">'+title+'</div>' +
           '<div class="week-label">'+label+'</div>'+body+'</div>';
  }

  el.innerHTML =
      renderWeekCard("This Week", fmtWeek(thisWeek), thisMap)
    + renderWeekCard("Next Week", fmtWeek(nextWeek), nextMap);

  // Append Recent Updates card (DOM-built to avoid quoting issues)
  const recentCard = document.createElement('div');
  recentCard.className = 'card';
  recentCard.id = 'recent-updates-card';

  const cardTitle = document.createElement('div');
  cardTitle.className = 'card-title';
  cardTitle.textContent = 'Recent Updates';
  recentCard.appendChild(cardTitle);

  if(auditLog.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'No recent activity';
    recentCard.appendChild(empty);
  } else {
    auditLog.forEach(entry => {
      const row = document.createElement('div');
      row.className = 'audit-row';

      const actionCls = 'audit-badge audit-' + entry.action;
      const actionLabel = entry.action === 'add' ? 'Added' :
                          entry.action === 'edit' ? 'Edited' : 'Deleted';

      // Format date range
      const s = entry.start_date ? Number(entry.start_date.slice(8)) : null;
      const e = entry.end_date   ? Number(entry.end_date.slice(8))   : null;
      const mo = entry.start_date ? MONTHS[Number(entry.start_date.slice(5,7))-1] : '';
      const dateStr = s && e ? (s===e ? mo+' '+s : mo+' '+s+'–'+e) : '';

      // Format timestamp in SG time
      const dt = new Date(entry.created_at);
      const timeStr = dt.toLocaleString('en-GB', {
        timeZone: 'Asia/Singapore',
        day:'2-digit', month:'short',
        hour:'2-digit', minute:'2-digit', hour12:false
      });

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.style.cssText = 'background:'+getColor(entry.employee_name)+';width:26px;height:26px;font-size:9px;flex-shrink:0';
      avatar.textContent = entry.employee_name.slice(0,2);

      const info = document.createElement('div');
      info.className = 'audit-info';
      info.innerHTML =
        '<div class="audit-top">' +
          '<span class="audit-name">'+entry.employee_name+'</span>' +
          '<span class="'+actionCls+'">'+actionLabel+'</span>' +
          (dateStr ? '<span class="audit-dates">'+dateStr+'</span>' : '') +
        '</div>' +
        '<div class="audit-time">'+timeStr+'</div>';

      row.appendChild(avatar);
      row.appendChild(info);
      recentCard.appendChild(row);
    });
  }

  el.appendChild(recentCard);
}

/* ═══════════════════════════════════════════
   BUILD CALENDAR
═══════════════════════════════════════════ */
function buildCalendar(){
  const el = document.getElementById('pg-calendar');
  el.innerHTML = '';
  const today = new Date();

  MONTHS.forEach((m, idx) => {
    if(idx < 3) return; // skip Jan–Mar

    const year       = 2026;
    const total      = new Date(year, idx+1, 0).getDate();
    const firstDow   = new Date(year, idx, 1).getDay();
    const startOffset = firstDow === 0 ? 6 : firstDow - 1;

    const block = document.createElement('div');
    block.className = 'month-block';
    block.innerHTML =
      '<div class="month-label">'+m+' '+year+'</div>' +
      '<div class="day-headers">'+
        ['M','T','W','T','F','S','S'].map(d=>'<div class="day-hdr">'+d+'</div>').join('')+
      '</div>';

    const grid = document.createElement('div');
    grid.className = 'cal-grid';

    for(let i=0;i<startOffset;i++){
      const blank=document.createElement('div');
      blank.className='cal-day empty-day';
      grid.appendChild(blank);
    }

    for(let d=1;d<=total;d++){
      const cell = document.createElement('div');
      cell.className = 'cal-day';

      const isToday = today.getFullYear()===year && today.getMonth()===idx && today.getDate()===d;
      if(isToday) cell.classList.add('today');

      const phName = PUBLIC_HOLIDAYS[phKey(m,d)] || null;
      const isLieu = phName && phName.includes('in lieu');
      if(phName) cell.classList.add(isLieu?'is-lieu':'is-ph');

      const numEl = document.createElement('div');
      numEl.className = 'cal-day-num'+(isLieu?' lieu-num':phName?' ph-num':'');
      numEl.textContent = d;
      cell.appendChild(numEl);

      if(phName){
        const phEl = document.createElement('div');
        phEl.className = isLieu?'cal-lieu-label':'cal-ph-label';
        phEl.textContent = phName;
        cell.appendChild(phEl);
      }

      // Find all blocks covering this day
      const isoDay = year+'-'+(String(idx+1).padStart(2,'0'))+'-'+(String(d).padStart(2,'0'));
      const dayBlocks = allEntries.filter(r =>
        r.start_date <= isoDay && isoDay <= r.end_date
      );

      const dotsWrap = document.createElement('div');
      dotsWrap.className = 'cal-dots';

      dayBlocks.forEach(row => {
        const dot = document.createElement('span');
        dot.className = 'cal-dot';
        dot.style.background = getColor(row.name);
        dot.title = row.name;
        const circle = document.createElement('span');
        circle.className = 'cal-dot-circle';
        dot.appendChild(circle);
        dot.appendChild(document.createTextNode(row.name));
        dotsWrap.appendChild(dot);
        cell.classList.add('has-leave');
      });

      cell.appendChild(dotsWrap);
      cell.onclick = () => openDayModal(m, d, year, dayBlocks);
      grid.appendChild(cell);
    }

    block.appendChild(grid);
    el.appendChild(block);
  });
}

          }).join('') +

      list.appendChild(row);
    });

    block.appendChild(list);

  });
}

function renderEditBox(el, filter){
  // On first call, build the shell (header + search + list container) once.
  // On subsequent calls (from search input), only refresh the list rows —
  // never touch the input so it keeps focus and the keyboard stays open.
  let listEl = el.querySelector('#mgmt-list-rows');
  let countEl = el.querySelector('.mgmt-count');

  if(!listEl){
    // First render — build the full shell
    el.innerHTML =
      '<div class="mgmt-box-hdr">Edit Leave <span class="mgmt-count">0</span></div>' +
      '<div class="mgmt-box-body" style="padding:0">' +
        '<div style="padding:10px 12px 6px">' +
          '<input class="mgmt-search" id="manageSearch" placeholder="Search name, date, type…">' +
        '</div>' +
        '<div class="mgmt-list" id="mgmt-list-rows"></div>' +
      '</div>';

    listEl  = el.querySelector('#mgmt-list-rows');
    countEl = el.querySelector('.mgmt-count');

    // Attach search listener ONCE — updates only the list, not the whole box
    el.querySelector('#manageSearch').addEventListener('input', ev => {
      refreshEditList(listEl, countEl, ev.target.value.toLowerCase());
    });
  }

  refreshEditList(listEl, countEl, filter);
}

function refreshEditList(listEl, countEl, filter){
  const entries = allEntries.filter(e =>
    !filter ||
    e.name.toLowerCase().includes(filter) ||
    e.start_date.includes(filter) ||
    e.leave_type.toLowerCase().includes(filter) ||
    (e.note||'').toLowerCase().includes(filter)
  );

  entries.sort((a,b) => a.start_date.localeCompare(b.start_date) || a.name.localeCompare(b.name));

  if(countEl) countEl.textContent = entries.length;

  listEl.innerHTML = '';

  if(entries.length === 0){
    listEl.innerHTML = '<div class="empty" style="padding:16px;text-align:center;">No entries found</div>';
    return;
  }

  entries.forEach(e => {
    const row = document.createElement('div');
    row.className = 'mgmt-entry';

    const s = e.start_date.slice(5).replace('-','/');
    const en = e.end_date.slice(5).replace('-','/');
    const dateStr = s===en ? s : s+' – '+en;
    const typeStr = leaveTypeLabel(e.leave_type);

    row.innerHTML =
      '<div class="avatar" style="background:'+getColor(e.name)+';width:26px;height:26px;font-size:9px">'+e.name.slice(0,2)+'</div>' +
      '<div class="mgmt-entry-info">' +
        '<span class="mgmt-entry-name">'+e.name+'</span>' +
        '<span class="mgmt-entry-meta">'+dateStr+' · '+typeStr+(e.note?' · '+e.note:'')+'</span>' +
      '</div>' +
      '<div class="mgmt-entry-actions">' +
        '<div class="btn-icon" style="width:28px;height:28px;font-size:13px" data-action="edit">&#9999;&#65039;</div>' +
        '<div class="btn-icon del" style="width:28px;height:28px;font-size:13px" data-action="del">&#128465;&#65039;</div>' +
      '</div>';

    row.querySelector('[data-action="edit"]').addEventListener('click', ()=> openEditModal(e));
    row.querySelector('[data-action="del"]').addEventListener('click',  ()=> confirmDelete(e.id, e.name, dateStr));
    listEl.appendChild(row);
  });
}

function handleAdd(){
  const empId = document.getElementById('f-emp').value;
  const type  = document.getElementById('f-type').value;
  const start = document.getElementById('f-start').value;
  const end   = document.getElementById('f-end').value;
  const note  = document.getElementById('f-note').value.trim();
  const errEl = document.getElementById('add-error');
  const btn   = document.getElementById('addBtn');

  errEl.style.display = 'none';
  errEl.textContent = '';

  if(!empId || !start || !end){
    errEl.textContent = 'Please fill in name, start date and end date.';
    errEl.style.display = 'block';
    return;
  }
  if(end < start){
    errEl.textContent = 'End date cannot be before start date.';
    errEl.style.display = 'block';
    return;
  }
  const yr = Number(start.slice(0,4));
  if(!CAL_YEARS.includes(yr)){
    errEl.textContent = 'Leave application is too far ahead.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  addEntry(empId, start, end, type, note).finally(()=>{ btn.disabled=false; });
}

function openModal(html){
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
}
function handleModalOverlay(e){
  if(e.target === document.getElementById('modal')) closeModal();
}

function openDayModal(m, d, year, blocks){
  const modalEl = document.getElementById('modalBox');
  const overlay = document.getElementById('modal');

  const title = document.createElement('div');
  title.className = 'modal-title';
  title.textContent = '📅 ' + m + ' ' + d + ', ' + year;

  const body = document.createElement('div');
  body.className = 'modal-body';

  if(blocks.length === 0){
    body.innerHTML = '<div class="empty">No one on leave</div>';
  } else {
    blocks.forEach(b => {
      const item = document.createElement('div');
      item.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px';
      item.innerHTML =
        '<div class="avatar" style="background:'+getColor(b.name)+';width:26px;height:26px;font-size:9px">'+b.name.slice(0,2)+'</div>' +
        '<div style="flex:1">' +
          '<div style="font-weight:600;font-size:13px">'+b.name+'</div>' +
          '<div style="font-size:11px;color:var(--text2)">'+leaveTypeLabel(b.leave_type)+(b.note?' · '+b.note:'')+'</div>' +
        '</div>';
      const delBtn = document.createElement('div');
      delBtn.className = 'btn-icon del';
      delBtn.style.cssText = 'width:26px;height:26px;font-size:12px';
      delBtn.textContent = '🗑️';
      delBtn.addEventListener('click', ()=>{ closeModal(); confirmDelete(b.id, b.name, fmtBlock(b)); });
      item.appendChild(delBtn);
      body.appendChild(item);
    });
  }

  const actions = document.createElement('div');
  actions.className = 'modal-actions';
  actions.innerHTML = '<button class="btn-modal btn-cancel" onclick="closeModal()">Close</button>';

  modalEl.innerHTML = '';
  modalEl.appendChild(title);
  modalEl.appendChild(body);
  modalEl.appendChild(actions);
  overlay.classList.add('open');

        '<div style="flex:1"><div style="font-size:11px;color:var(--text2);margin-bottom:3px">From</div>' +
          '<input id="ei-start" type="date" class="edit-input" style="margin:0;width:100%" value="'+entry.start_date+'"></div>' +
        '<div style="flex:1"><div style="font-size:11px;color:var(--text2);margin-bottom:3px">To</div>' +
          '<input id="ei-end" type="date" class="edit-input" style="margin:0;width:100%" value="'+entry.end_date+'"></div>' +
      '</div>' +
      '<select id="ei-type" class="edit-input" style="margin:0">'+typeOptions+'</select>' +
      '<input id="ei-note" class="edit-input" style="margin:0" placeholder="Note (optional)" value="'+(entry.note||'')+'">' +
    '</div>' +
    '<div class="modal-actions">' +
      '<button class="btn-modal btn-cancel" onclick="closeModal()">Cancel</button>' +
      '<button class="btn-modal btn-confirm-save" id="editSaveBtn">Save</button>' +
    '</div>'
  );
  document.getElementById('editSaveBtn').addEventListener('click', ()=>{
    const s = document.getElementById('ei-start').value;
    const e = document.getElementById('ei-end').value;
    const t = document.getElementById('ei-type').value;
    const n = document.getElementById('ei-note').value;
    closeModal();
    editEntry(entry.id, s, e, t, n);
  });
}

/* ═══════════════════════════════════════════
   TABS
═══════════════════════════════════════════ */
let currentTab = 0;
const pagesEl  = document.getElementById('pages');
const tabBtns  = document.querySelectorAll('.tab-btn');
function goTab(i){
  currentTab = i;
  pagesEl.style.transform = 'translateX(-'+(i*25)+'%)';
  tabBtns.forEach((b,j)=>b.classList.toggle('active',j===i));
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
let toastTimer;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2500);
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
['pg-home','pg-calendar','pg-summary','pg-manage'].forEach(id => {
  document.getElementById(id).innerHTML =
    '<div class="loading"><div class="spinner"></div><div>Loading…</div></div>';
});

loadData().then(() => {
  buildHome(); buildCalendar(); buildSummary(); buildManage();
});

</script>
</body>
</html>
